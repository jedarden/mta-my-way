# Prometheus configuration for mta-my-way
#
# This configuration scrapes metrics from the mta-my-way server.
# Place this file in your Prometheus configuration directory.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'mta-my-way'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Rule files
rule_files:
  - 'alerts.yml'

# Scrape configurations
scrape_configs:
  # mta-my-way server metrics
  - job_name: 'mta-my-way'
    scrape_interval: 15s
    metrics_path: '/api/metrics'
    static_configs:
      - targets: ['host.docker.internal:3000']
        labels:
          service: 'mta-my-way'
          environment: 'development'

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
