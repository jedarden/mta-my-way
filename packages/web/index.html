<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0039A6" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#121212" media="(prefers-color-scheme: dark)" />
    <meta name="description" content="Mobile-first PWA for NYC subway commuters - real-time arrivals, transfer intelligence, and filtered alerts" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MTA My Way" />
    <!-- Resource hints for performance -->
    <link rel="preconnect" href="/" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />
    <!-- Prefetch critical API data -->
    <link rel="prefetch" href="/api/stations" />
    <link rel="prefetch" href="/api/routes" />
    <link rel="prefetch" href="/api/health" />
    <!-- Preload critical assets -->
    <link rel="modulepreload" href="/src/main.tsx" />
    <link rel="modulepreload" href="/src/App.tsx" />
    <link rel="preload" href="/favicon.svg" as="image" type="image/svg+xml" />
    <!-- Preconnect to origin for faster subsequent requests -->
    <link rel="preconnect" href="https://api.mta.info" crossorigin />
    <!-- Defer non-critical resources -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <title>MTA My Way</title>
  </head>
  <body class="bg-background text-text-primary">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
