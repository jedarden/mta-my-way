<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You're Offline - MTA My Way</title>
  <style>
    :root {
      --mta-blue: #0039A6;
      --mta-red: #EE352E;
      --text-primary: #1a1a1a;
      --text-secondary: #666666;
      --background: #ffffff;
      --surface: #f5f5f5;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--background);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      line-height: 1.5;
    }

    .container {
      max-width: 400px;
      width: 100%;
      text-align: center;
    }

    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      background: var(--surface);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon svg {
      width: 40px;
      height: 40px;
      stroke: var(--mta-blue);
    }

    h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--text-primary);
    }

    p {
      font-size: 16px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .info {
      background: var(--surface);
      border-radius: 12px;
      padding: 16px;
      margin: 24px 0;
      font-size: 14px;
    }

    .info-title {
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text-primary);
    }

    .info ul {
      list-style: none;
      text-align: left;
    }

    .info li {
      padding: 4px 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .info li::before {
      content: "✓";
      color: var(--mta-blue);
      font-weight: bold;
    }

    button {
      background: var(--mta-blue);
      color: white;
      border: none;
      padding: 14px 28px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-top: 16px;
    }

    button:hover {
      opacity: 0.9;
    }

    button:active {
      transform: scale(0.98);
    }

    .status {
      margin-top: 16px;
      font-size: 14px;
      color: var(--text-secondary);
    }

    .status.online {
      color: #22c55e;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --text-primary: #f5f5f5;
        --text-secondary: #a0a0a0;
        --background: #1a1a1a;
        --surface: #2a2a2a;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 1l22 22" />
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55" />
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39" />
        <path d="M10.71 5.05A16 16 0 0 1 22.58 9" />
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88" />
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0" />
        <path d="M12 20h.01" />
      </svg>
    </div>

    <h1>You're Offline</h1>

    <p>Check your internet connection to continue using MTA My Way.</p>

    <div class="info">
      <div class="info-title">While offline, you can still:</div>
      <ul>
        <li>View previously loaded stations</li>
        <li>Check cached arrival times</li>
        <li>Access saved favorites</li>
        <li>View your commute routes</li>
      </ul>
    </div>

    <button id="retry-btn">Try Again</button>

    <div class="status" id="connection-status">
      <span id="status-dot">⚫</span> Checking connection...
    </div>
  </div>

  <script>
    const retryBtn = document.getElementById('retry-btn');
    const statusDiv = document.getElementById('connection-status');
    const statusDot = document.getElementById('status-dot');

    function updateOnlineStatus() {
      if (navigator.onLine) {
        statusDiv.className = 'status online';
        statusDiv.innerHTML = '<span id="status-dot">🟢</span> Connection restored! Redirecting...';
        // Redirect to home after a short delay
        setTimeout(() => {
          window.location.href = '/';
        }, 1000);
      } else {
        statusDiv.className = 'status';
        statusDiv.innerHTML = '<span id="status-dot">⚫</span> Still offline';
      }
    }

    // Check online status on page load
    updateOnlineStatus();

    // Listen for online/offline events
    window.addEventListener('online', updateOnlineStatus);
    window.addEventListener('offline', updateOnlineStatus);

    // Retry button - reloads the page
    retryBtn.addEventListener('click', () => {
      statusDiv.innerHTML = '<span id="status-dot">🔄</span> Connecting...';
      window.location.reload();
    });
  </script>
</body>
</html>
